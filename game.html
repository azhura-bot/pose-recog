<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pose Runner - Halaman Permainan</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      overflow-x: hidden;
    }

    .play-page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 1px;
      line-height: 1;
    }

    .hint {
      color: #b0bfd6;
      margin: 0;
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(360px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(160deg, #101b2f, #132440);
      border-radius: 18px;
      padding: 14px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #b0bfd6;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .subway-frame {
      width: 100%;
      height: 70vh;
      min-height: 520px;
      border: 0;
      border-radius: 12px;
      background: #000;
    }

    .video-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      min-height: 520px;
      display: grid;
      place-items: center;
    }

    #poseStream {
      width: 100%;
      height: 70vh;
      min-height: 520px;
      object-fit: cover;
      display: block;
    }

    #cameraStatus {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      margin: 0;
      background: rgba(8, 17, 31, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 8px 10px;
      color: #eaf2ff;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #08111f;
      background: #6fffb0;
      font-weight: 800;
      padding: 10px 16px;
      border-radius: 999px;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .subway-frame,
      #poseStream,
      .video-wrap {
        height: 58vh;
        min-height: 420px;
      }
    }

    @media (max-width: 680px) {
      .play-page {
        padding: 16px;
      }

      .subway-frame,
      #poseStream,
      .video-wrap {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <section class="play-page">
    <div class="topbar">
      <div>
        <h1>Mode Bermain</h1>
        <p class="hint">Kontrol pose: geser badan kiri/kanan, jongkok, lompat. Tepuk tangan = tombol ESC (pause/resume).</p>
      </div>
      <a href="index.html" class="back">Kembali ke Landing Page</a>
    </div>

    <div class="layout">
      <article class="panel">
        <h2 class="panel-title">Subway Surfers (CodeSandbox Preview)</h2>
        <iframe
          class="subway-frame"
          src="https://codesandbox.io/embed/ly4fsf?view=preview"
          title="Subway Surfers"
          allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking"
          sandbox="allow-forms allow-modals allow-popups allow-presentation allow-same-origin allow-scripts"
          scrolling="no"
          allowfullscreen
        ></iframe>
      </article>

      <article class="panel">
        <h2 class="panel-title">Video Real-time + Landmark</h2>
        <div class="video-wrap">
          <img id="poseStream" alt="Pose stream dengan landmark MediaPipe" />
          <p id="cameraStatus">Menghubungkan stream backend...</p>
        </div>
      </article>
    </div>
  </section>

  <script>
    const poseStream = document.getElementById("poseStream");
    const cameraStatus = document.getElementById("cameraStatus");
    const backendBase = (window.location.port === "5000")
      ? ""
      : "http://127.0.0.1:5000";

    function connectPoseStream() {
      const streamUrl = `${backendBase}/video_feed?t=${Date.now()}`;
      poseStream.src = streamUrl;
    }

    poseStream.addEventListener("load", () => {
      cameraStatus.textContent = "Stream aktif. Landmark diproses oleh backend MediaPipe.";
    });

    poseStream.addEventListener("error", () => {
      cameraStatus.textContent = "Gagal memuat stream. Pastikan backend python berjalan di 127.0.0.1:5000.";
    });

    connectPoseStream();
  </script>
</body>
</html>
